version: 2
updates:
  # npm dependencies — group the Astro toolchain into one PR to reduce noise.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      dev-tooling:
        patterns:
          - "prettier*"
          - "typescript"
          - "playwright"
  # Keep the GitHub Actions in deploy.yml current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
