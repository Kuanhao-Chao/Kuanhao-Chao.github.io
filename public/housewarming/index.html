<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="googlebot" content="noindex, nofollow, noarchive" />
  <meta name="bingbot" content="noindex, nofollow, noarchive" />
  <title>喬遷派對已結束</title>
  <meta name="description" content="這個私人活動已經結束，詳細資訊已移除。" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --rule: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --rule: #334155;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid var(--rule);
      border-radius: 12px;
      background: var(--card);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      line-height: 1.15;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <h1>喬遷派對已結束</h1>
    <p>這個私人活動已經結束，原本的地址、RSVP、地圖與行事曆資訊已移除。</p>
    <p>This private event has passed. Address, RSVP, map, and calendar details have been removed.</p>
  </main>
</body>
</html>
